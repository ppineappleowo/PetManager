<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 宠物管家</title>
<style>
/* ====== CSS Variables ====== */
:root {
  --primary: #059669; --primary-light: #34d399; --primary-dark: #047857;
  --secondary: #0d9488; --bg: #f0fdf4; --surface: #ffffff;
  --text: #1f2937; --text-secondary: #6b7280; --border: #d1fae5;
  --sidebar-width: 280px; --radius: 12px; --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
  --shadow-md: 0 4px 12px rgba(5,150,105,0.08); --shadow-lg: 0 8px 30px rgba(5,150,105,0.12);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: linear-gradient(135deg, #ecfdf5 0%, #d1fae5 35%, #ccfbf1 65%, #e0f2fe 100%);
  background-attachment: fixed;
  height: 100vh; color: var(--text); overflow: hidden;
}

/* ====== Decorative Background ====== */
.bg-decor {
  position: fixed; pointer-events: none; z-index: 0;
}
.bg-decor-circle {
  border-radius: 50%; position: absolute;
  background: radial-gradient(circle, rgba(5,150,105,0.06) 0%, transparent 70%);
}
.bg-decor-circle:nth-child(1) { width: 400px; height: 400px; top: -100px; right: -80px; animation: float 8s ease-in-out infinite; }
.bg-decor-circle:nth-child(2) { width: 300px; height: 300px; bottom: -60px; left: 220px; animation: float 10s ease-in-out 1s infinite; }
.bg-decor-circle:nth-child(3) { width: 200px; height: 200px; top: 40%; left: 320px; animation: float 7s ease-in-out 2s infinite; }
@keyframes float {
  0%, 100% { transform: translateY(0) scale(1); }
  50% { transform: translateY(-20px) scale(1.05); }
}

/* ====== Toast Container ====== */
.toast-container {
  position: fixed; top: 20px; right: 20px; z-index: 9999;
  display: flex; flex-direction: column; gap: 8px; pointer-events: none;
}
.toast {
  padding: 12px 20px; border-radius: var(--radius); font-size: 13px; font-weight: 500;
  color: white; pointer-events: auto; cursor: pointer;
  box-shadow: 0 4px 16px rgba(0,0,0,0.15);
  animation: toastIn 0.35s cubic-bezier(0.16,1,0.3,1), toastOut 0.3s ease 2.2s forwards;
  max-width: 360px; backdrop-filter: blur(8px);
}
.toast.success { background: rgba(5,150,105,0.92); }
.toast.error   { background: rgba(239,68,68,0.92); }
.toast.confirm { background: rgba(255,255,255,0.95); color: var(--text); border: 1px solid var(--border);
  display: flex; gap: 10px; align-items: center; animation: toastIn 0.35s cubic-bezier(0.16,1,0.3,1); cursor: default; }
.toast.confirm .toast-btns { display: flex; gap: 8px; margin-left: auto; }
.toast.confirm button {
  padding: 4px 14px; border-radius: 8px; border: none; cursor: pointer; font-size: 12px; font-weight: 600; font-family: inherit;
  transition: transform 0.15s;
}
.toast.confirm .btn-yes { background: var(--primary); color: white; }
.toast.confirm .btn-no  { background: #f3f4f6; color: var(--text-secondary); }
.toast.confirm button:active { transform: scale(0.95); }
@keyframes toastIn  { from { opacity: 0; transform: translateX(60px); } to { opacity: 1; transform: translateX(0); } }
@keyframes toastOut { to   { opacity: 0; transform: translateX(60px); } }

/* ====== SIDEBAR ====== */
.sidebar-backdrop { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.25); z-index: 10; backdrop-filter: blur(2px); }
.sidebar {
  position: fixed; left: 0; top: 0; bottom: 0; width: var(--sidebar-width);
  background: rgba(255,255,255,0.85); backdrop-filter: blur(20px);
  border-right: 1px solid var(--border); z-index: 20;
  display: flex; flex-direction: column; transition: transform 0.3s cubic-bezier(0.16,1,0.3,1);
  box-shadow: 1px 0 20px rgba(0,0,0,0.04);
}
.sidebar-header {
  padding: 20px 16px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.sidebar-logo { display: flex; align-items: center; gap: 10px; }
.sidebar-logo .icon {
  width: 38px; height: 38px;
  background: linear-gradient(135deg, var(--primary), var(--secondary));
  border-radius: 12px; display: flex; align-items: center; justify-content: center;
  box-shadow: 0 2px 8px rgba(5,150,105,0.3);
}
.sidebar-logo .icon svg { width: 22px; height: 22px; color: white; }
.sidebar-logo h1 { font-size: 17px; font-weight: 700;
  background: linear-gradient(135deg, var(--primary-dark), var(--secondary));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.btn-new-chat {
  width: calc(100% - 24px); margin: 14px auto; padding: 11px;
  border: 1.5px dashed var(--border); border-radius: var(--radius);
  background: rgba(5,150,105,0.04); color: var(--primary);
  font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit;
  display: flex; align-items: center; justify-content: center; gap: 6px;
  transition: all 0.25s; position: relative; overflow: hidden;
}
.btn-new-chat:hover { background: rgba(5,150,105,0.10); border-color: var(--primary-light); transform: translateY(-1px); }
.btn-new-chat:active { transform: scale(0.97); }
.thread-list { flex: 1; overflow-y: auto; padding: 6px 8px; }
.thread-list::-webkit-scrollbar { width: 4px; }
.thread-list::-webkit-scrollbar-thumb { background: #d1fae5; border-radius: 4px; }
.thread-list::-webkit-scrollbar-track { background: transparent; }

.thread-item {
  display: flex; align-items: center; gap: 8px; padding: 11px 14px;
  border-radius: var(--radius); cursor: pointer; transition: all 0.2s;
  margin-bottom: 3px; position: relative;
}
.thread-item:hover { background: rgba(5,150,105,0.06); }
.thread-item.active { background: rgba(5,150,105,0.10); }
.thread-item.active::before {
  content: ''; position: absolute; left: 0; top: 50%; transform: translateY(-50%);
  width: 3px; height: 24px; border-radius: 0 3px 3px 0;
  background: linear-gradient(180deg, var(--primary), var(--secondary));
}
.thread-item.active .thread-title { color: var(--primary-dark); font-weight: 600; }
.thread-icon {
  width: 30px; height: 30px; border-radius: 10px; flex-shrink: 0;
  background: rgba(5,150,105,0.08); display: flex; align-items: center; justify-content: center;
  font-size: 14px; transition: all 0.2s;
}
.thread-item.active .thread-icon { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; }
.thread-info { flex: 1; min-width: 0; }
.thread-title {
  font-size: 13px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  transition: color 0.2s;
}
.thread-meta { font-size: 11px; color: var(--text-secondary); margin-top: 3px; }
.thread-delete {
  opacity: 0; width: 26px; height: 26px; border: none; background: none;
  color: #ef4444; cursor: pointer; border-radius: 8px; font-size: 15px;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  transition: all 0.2s;
}
.thread-item:hover .thread-delete { opacity: 1; }
.thread-delete:hover { background: rgba(239,68,68,0.1); transform: scale(1.1); }
.thread-empty {
  text-align: center; padding: 44px 16px; color: var(--text-secondary); font-size: 13px;
}

/* ====== MAIN AREA ====== */
.main {
  margin-left: var(--sidebar-width); height: 100vh;
  display: flex; flex-direction: column; transition: margin-left 0.3s cubic-bezier(0.16,1,0.3,1);
  position: relative; z-index: 1;
}
.main-header {
  display: flex; align-items: center; gap: 12px; padding: 14px 20px;
  background: rgba(255,255,255,0.75); backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border); flex-shrink: 0;
  box-shadow: 0 1px 8px rgba(0,0,0,0.03);
}
.btn-toggle-sidebar {
  display: none; width: 38px; height: 38px; border: none; background: none;
  border-radius: 10px; cursor: pointer; color: var(--text-secondary); font-size: 20px;
  align-items: center; justify-content: center; transition: all 0.2s;
}
.btn-toggle-sidebar:hover { background: rgba(0,0,0,0.04); }
.main-header-title { font-size: 15px; font-weight: 600; color: var(--text); }

/* Chat area */
.chat-area {
  flex: 1; overflow-y: auto; padding: 20px;
  display: flex; flex-direction: column; scroll-behavior: smooth;
}
.chat-area::-webkit-scrollbar { width: 5px; }
.chat-area::-webkit-scrollbar-thumb { background: #d1fae5; border-radius: 5px; }
.chat-area::-webkit-scrollbar-track { background: transparent; }

/* Welcome */
.welcome {
  flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
  text-align: center; padding: 40px 20px; animation: fadeInUp 0.5s ease;
}
@keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
.welcome-icon {
  width: 72px; height: 72px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center; margin-bottom: 16px;
  animation: breathe 3s ease-in-out infinite;
}
@keyframes breathe {
  0%, 100% { box-shadow: 0 0 0 0 rgba(5,150,105,0.2); }
  50% { box-shadow: 0 0 0 20px rgba(5,150,105,0); }
}
.welcome-icon-inner {
  width: 64px; height: 64px; border-radius: 50%;
  background: linear-gradient(135deg, rgba(5,150,105,0.12), rgba(13,148,136,0.08));
  display: flex; align-items: center; justify-content: center;
}
.welcome-icon-inner svg { width: 38px; height: 38px; color: var(--primary); }
.welcome h2 { font-size: 18px; color: var(--text); margin-bottom: 6px; }
.welcome p { font-size: 13px; color: var(--text-secondary); max-width: 340px; }
.welcome-tips { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin-top: 18px; }
.welcome-tip {
  padding: 7px 16px; background: rgba(255,255,255,0.75); border-radius: 20px;
  font-size: 12px; border: 1px solid var(--border); cursor: pointer;
  transition: all 0.25s; backdrop-filter: blur(4px); user-select: none;
}
.welcome-tip:hover {
  background: var(--primary); color: white; border-color: var(--primary);
  transform: translateY(-2px); box-shadow: 0 4px 12px rgba(5,150,105,0.2);
}

/* Messages */
.messages { display: flex; flex-direction: column; gap: 20px; flex: 1; }
.msg { display: flex; gap: 10px; max-width: 82%; animation: msgSlideIn 0.35s cubic-bezier(0.16,1,0.3,1); }
.msg.user { align-self: flex-end; flex-direction: row-reverse; }
.msg.assistant { align-self: flex-start; }
@keyframes msgSlideIn {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}
.msg-avatar {
  width: 34px; height: 34px; border-radius: 12px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center; font-size: 16px;
  transition: transform 0.2s;
}
.msg-avatar:hover { transform: scale(1.1); }
.msg.user .msg-avatar { background: #f3f4f6; }
.msg.assistant .msg-avatar { background: linear-gradient(135deg, var(--primary), var(--secondary)); box-shadow: 0 2px 8px rgba(5,150,105,0.2); }
.msg-avatar svg { width: 18px; height: 18px; }
.msg.user .msg-avatar svg { color: #9ca3af; }
.msg.assistant .msg-avatar svg { color: white; }

/* Message wrapper for action bar */
.msg-content-wrap { position: relative; display: flex; flex-direction: column; min-width: 0; }

.msg-bubble {
  padding: 11px 16px; border-radius: 16px; font-size: 14px; line-height: 1.7;
  word-break: break-word; white-space: pre-wrap;
  box-shadow: var(--shadow-sm); transition: box-shadow 0.2s;
}
.msg.user .msg-bubble {
  background: linear-gradient(135deg, var(--primary), #0d9488);
  color: white; border-bottom-right-radius: 6px;
}
.msg.assistant .msg-bubble {
  background: var(--surface); color: var(--text); border: 1px solid #f0fdf4;
  border-bottom-left-radius: 6px;
}
.msg-image { max-width: 220px; max-height: 220px; border-radius: 12px; margin-bottom: 8px; cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s; }
.msg-image:hover { transform: scale(1.03); box-shadow: var(--shadow-md); }

/* Message timestamp */
.msg-time {
  font-size: 10px; color: var(--text-secondary); margin-top: 4px;
  opacity: 0; transition: opacity 0.2s;
}
.msg-content-wrap:hover .msg-time { opacity: 1; }
.msg.user .msg-time { text-align: right; }

/* Message action bar */
.msg-actions { display: flex; gap: 6px; margin-top: 4px; opacity: 0; transition: opacity 0.2s; }
.msg-content-wrap:hover .msg-actions { opacity: 1; }
.msg-actions button {
  padding: 3px 10px; border: 1px solid var(--border); border-radius: 8px;
  background: var(--surface); color: var(--text-secondary); font-size: 11px;
  cursor: pointer; font-family: inherit; transition: all 0.15s;
}
.msg-actions button:hover { background: var(--bg); color: var(--primary); border-color: var(--primary-light); }
.msg-actions button:active { transform: scale(0.95); }
.msg-actions button.copied { background: var(--primary); color: white; border-color: var(--primary); }

/* User message edit on double-click */
.msg.user .msg-bubble { cursor: default; }

/* Markdown styles */
.msg-bubble strong { color: inherit; font-weight: 700; }
.msg-bubble em { font-style: italic; }
.msg-bubble code {
  background: rgba(0,0,0,0.06); padding: 2px 6px; border-radius: 4px;
  font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace; font-size: 0.9em;
}
.msg.user .msg-bubble code { background: rgba(255,255,255,0.2); }
.msg-bubble pre {
  background: #1e293b; color: #e2e8f0; padding: 12px 16px; border-radius: 10px;
  overflow-x: auto; margin: 6px 0; font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
  font-size: 0.85em; line-height: 1.6;
}
.msg-bubble pre code { background: none; padding: 0; font-size: inherit; }
.msg-bubble ul, .msg-bubble ol { padding-left: 20px; margin: 4px 0; }
.msg-bubble li { margin: 2px 0; }
.msg-bubble a { color: var(--primary); text-decoration: underline; }
.msg.user .msg-bubble a { color: white; }
.msg-bubble blockquote {
  border-left: 3px solid var(--primary-light); padding-left: 12px;
  color: var(--text-secondary); margin: 6px 0;
}
.msg-bubble h1, .msg-bubble h2, .msg-bubble h3 {
  font-weight: 700; margin: 8px 0 4px; line-height: 1.3;
}
.msg-bubble h1 { font-size: 1.3em; } .msg-bubble h2 { font-size: 1.15em; } .msg-bubble h3 { font-size: 1.05em; }
.msg-bubble hr { border: none; border-top: 1px solid var(--border); margin: 8px 0; }

/* Typing indicator */
.typing-indicator {
  display: flex; align-items: center; gap: 6px; padding: 4px 0;
  font-size: 12px; color: var(--text-secondary);
}
.typing-dots { display: flex; gap: 3px; align-items: center; }
.typing-dot {
  width: 6px; height: 6px; border-radius: 50%; background: var(--primary-light);
  animation: bounce 1.2s ease-in-out infinite;
}
.typing-dot:nth-child(2) { animation-delay: 0.2s; }
.typing-dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce {
  0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
  30% { transform: translateY(-5px); opacity: 1; }
}

/* Input area */
.input-area {
  padding: 14px 20px 20px; flex-shrink: 0;
}
.input-row {
  display: flex; gap: 10px; align-items: flex-end;
  background: rgba(255,255,255,0.78); backdrop-filter: blur(16px);
  border-radius: 18px; padding: 10px 12px; border: 1.5px solid var(--border);
  transition: border-color 0.3s, box-shadow 0.3s;
}
.input-row:focus-within {
  border-color: var(--primary-light);
  box-shadow: 0 0 0 4px rgba(5,150,105,0.06);
}
.btn-upload {
  width: 40px; height: 40px; border: none; border-radius: 12px;
  background: #f0fdf4; color: var(--primary); cursor: pointer;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  transition: all 0.2s; font-size: 18px;
}
.btn-upload:hover { background: #d1fae5; transform: scale(1.05); }
.btn-upload.has-image { background: var(--primary); color: white; }
.btn-upload:active { transform: scale(0.95); }
#imageInput { display: none; }
.textarea-wrap { flex: 1; position: relative; }
.textarea-wrap textarea {
  width: 100%; border: none; border-radius: 12px; padding: 9px 12px;
  font-size: 14px; resize: none; outline: none; background: transparent;
  font-family: inherit; line-height: 1.6; transition: height 0.15s ease;
}
.textarea-wrap textarea::placeholder { color: #cbd5e1; }
.img-preview-tag {
  position: absolute; top: -30px; left: 4px; display: none; align-items: center; gap: 4px;
  background: var(--primary); color: white; padding: 3px 12px; border-radius: 12px;
  font-size: 11px; box-shadow: var(--shadow-sm);
}
.img-preview-tag button {
  background: none; border: none; color: white; cursor: pointer; font-size: 15px;
  padding: 0 3px; transition: transform 0.15s;
}
.img-preview-tag button:hover { transform: scale(1.2); }
.btn-send {
  width: 42px; height: 42px; border: none; border-radius: 14px;
  background: linear-gradient(135deg, var(--primary), var(--secondary));
  color: white; cursor: pointer; display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: all 0.25s;
  box-shadow: 0 4px 14px rgba(5,150,105,0.3); position: relative; overflow: hidden;
}
.btn-send:hover:not(:disabled) { transform: scale(1.06); box-shadow: 0 6px 20px rgba(5,150,105,0.4); }
.btn-send:active:not(:disabled) { transform: scale(0.95); }
.btn-send:disabled { background: #d1d5db; box-shadow: none; cursor: not-allowed; transform: none; }
.btn-send svg { width: 20px; height: 20px; }
.btn-send .ripple {
  position: absolute; border-radius: 50%; background: rgba(255,255,255,0.4);
  animation: ripple 0.6s ease-out; pointer-events: none;
}
@keyframes ripple { to { width: 120px; height: 120px; margin-left: -60px; margin-top: -60px; opacity: 0; } }
.spinner {
  width: 20px; height: 20px; border: 2px solid rgba(255,255,255,0.3);
  border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite; display: none;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ====== RESPONSIVE ====== */
@media (max-width: 768px) {
  .sidebar { transform: translateX(-100%); }
  .sidebar.open { transform: translateX(0); }
  .sidebar-backdrop.show { display: block; }
  .btn-toggle-sidebar { display: flex; }
  .main { margin-left: 0 !important; }
  .msg { max-width: 90%; }
}
</style>
</head>
<body>

<!-- Decorative background -->
<div class="bg-decor">
  <div class="bg-decor-circle"></div>
  <div class="bg-decor-circle"></div>
  <div class="bg-decor-circle"></div>
</div>

<!-- Toast container -->
<div class="toast-container" id="toastContainer"></div>

<!-- Sidebar backdrop -->
<div class="sidebar-backdrop" id="sidebarBackdrop" onclick="closeSidebar()"></div>

<!-- ====== SIDEBAR ====== -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <div class="sidebar-logo">
      <div class="icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="4" r="2"/><circle cx="18" cy="8" r="2"/><circle cx="20" cy="16" r="2"/><circle cx="4" cy="16" r="2"/><path d="M12 12a4 4 0 1 0 0 8 4 4 0 1 0 0-8z"/></svg>
      </div>
      <h1>AI 宠物管家</h1>
    </div>
  </div>
  <button class="btn-new-chat" onclick="createNewThread()">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5v14"/></svg>
    新建会话
  </button>
  <div class="thread-list" id="threadList">
    <div class="thread-empty">暂无历史会话<br><span style="font-size:12px;color:#9ca3af">开始一段新的对话吧 🐾</span></div>
  </div>
</aside>

<!-- ====== MAIN ====== -->
<div class="main" id="main">
  <div class="main-header">
    <button class="btn-toggle-sidebar" onclick="toggleSidebar()" title="会话列表">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
    </button>
    <span class="main-header-title" id="mainTitle">宠物养护咨询</span>
    <span style="flex:1"></span>
    <span style="font-size:13px;color:var(--text-secondary);margin-right:12px" id="headerUsername"></span>
    <button onclick="logout()" style="padding:6px 14px;border:1px solid var(--border);border-radius:10px;background:white;color:var(--text-secondary);cursor:pointer;font-size:12px;font-family:inherit;transition:all 0.2s" onmouseover="this.style.borderColor='#fca5a5';this.style.color='#ef4444'" onmouseout="this.style.borderColor='var(--border)';this.style.color='var(--text-secondary)'">退出</button>
  </div>

  <div class="chat-area" id="chatArea">
    <div class="messages" id="messages">
      <div class="welcome" id="welcome">
        <div class="welcome-icon">
          <div class="welcome-icon-inner">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>
          </div>
        </div>
        <h2>🐶 你好，我是你的 AI 宠物管家 🐱</h2>
        <p>上传宠物照片或描述宠物情况，我会为你提供专业的养护建议</p>
        <div class="welcome-tips">
          <span class="welcome-tip" onclick="fillPrompt('帮我识别这只宠物的品种')">🔍 识别品类</span>
          <span class="welcome-tip" onclick="fillPrompt('宠物常见病有哪些？如何预防？')">💊 常见病科普</span>
          <span class="welcome-tip" onclick="fillPrompt('请给我一份科学的宠物喂养方案')">🍖 喂食方案</span>
          <span class="welcome-tip" onclick="fillPrompt('宠物洗护的正确方法和频率')">🛁 洗护建议</span>
          <span class="welcome-tip" onclick="fillPrompt('如何训练宠物养成良好的习惯？')">🎾 训练技巧</span>
          <span class="welcome-tip" onclick="fillPrompt('请帮我评估这只宠物的健康状况')">❤️ 健康评估</span>
        </div>
      </div>
    </div>
  </div>

  <div class="input-area">
    <div class="input-row">
      <button class="btn-upload" id="btnUpload" onclick="document.getElementById('imageInput').click()" title="上传图片">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect width="18" height="18" x="3" y="3" rx="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></svg>
      </button>
      <input type="file" id="imageInput" accept="image/*" onchange="handleImageSelect(event)">
      <div class="textarea-wrap">
        <div class="img-preview-tag" id="imgPreviewTag">📷 <span id="imgPreviewName"></span><button onclick="removeImage()">×</button></div>
        <textarea id="textInput" rows="1" placeholder="描述你的宠物情况... (Ctrl+Enter 发送)"
          onkeydown="handleKeyDown(event)"
          oninput="autoResize(this)"></textarea>
      </div>
      <button class="btn-send" id="btnSend" disabled onclick="sendMessage()">
        <svg id="sendIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14.536 21.686a.5.5 0 0 0 .937-.024l6.5-19a.496.496 0 0 0-.635-.635l-19 6.5a.5.5 0 0 0-.024.937l7.93 3.18a2 2 0 0 1 1.112 1.11z"/><path d="m21.854 2.147-10.94 10.939"/></svg>
        <div class="spinner" id="sendSpinner"></div>
      </button>
    </div>
  </div>
</div>

<script>
// ==================== AUTH GUARD ====================
const TOKEN = sessionStorage.getItem('token');
const USERNAME = sessionStorage.getItem('username');
if (!TOKEN) { window.location.replace('/login.html'); }

// ==================== STATE ====================
const STORAGE_KEY = 'pet_manager_thread_id';
let threadId = sessionStorage.getItem(STORAGE_KEY) || generateId();
let selectedImage = null;
let isStreaming = false;
let threads = [];
let userScrolledUp = false;
let editableBubble = null;

sessionStorage.setItem(STORAGE_KEY, threadId);
function generateId() { return 'thread_' + Date.now() + '_' + Math.random().toString(36).slice(2,9); }

// ==================== AUTH FETCH ====================
function authHeaders() {
  return { 'Authorization': 'Bearer ' + TOKEN, 'Content-Type': 'application/json' };
}
async function authFetch(url, options = {}) {
  const merged = { ...options, headers: { ...authHeaders(), ...(options.headers || {}) } };
  if (!options.body || !(options.body instanceof FormData)) {
    merged.headers['Content-Type'] = 'application/json';
  }
  const resp = await fetch(url, merged);
  if (resp.status === 401) {
    sessionStorage.removeItem('token');
    sessionStorage.removeItem('username');
    window.location.replace('/login.html');
    throw new Error('未登录');
  }
  return resp;
}

// ==================== TOAST SYSTEM ====================
function toast(msg, type = 'success') {
  const container = document.getElementById('toastContainer');
  const el = document.createElement('div');
  el.className = 'toast ' + type;
  el.textContent = msg;
  el.onclick = () => el.remove();
  container.appendChild(el);
  setTimeout(() => el.remove(), 2600);
}

function toastConfirm(msg, onYes) {
  const container = document.getElementById('toastContainer');
  const el = document.createElement('div');
  el.className = 'toast confirm';
  el.innerHTML = `<span>${msg}</span><div class="toast-btns">
    <button class="btn-yes">确认</button>
    <button class="btn-no">取消</button>
  </div>`;
  el.querySelector('.btn-yes').onclick = () => { el.remove(); onYes(); };
  el.querySelector('.btn-no').onclick = () => el.remove();
  container.appendChild(el);
}

// ==================== MARKDOWN PARSER ====================
function renderMarkdown(text) {
  if (!text) return '';
  let html = escHtml(text);
  // Code blocks (``` ... ```)
  html = html.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) =>
    `<pre><code>${code.trim()}</code></pre>`);
  // Inline code (`...`)
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
  // Bold
  html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  // Italic
  html = html.replace(/\*([^*]+)\*/g, '<em>$1</em>');
  // Headings
  html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');
  // Unordered list
  html = html.replace(/^[\-\*] (.+)$/gm, '<li>$1</li>');
  html = html.replace(/((?:<li>.*<\/li>\n?)+)/g, '<ul>$1</ul>');
  // Ordered list
  html = html.replace(/^\d+\. (.+)$/gm, '<li>$1</li>');
  // Blockquote
  html = html.replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>');
  // Horizontal rule
  html = html.replace(/^---$/gm, '<hr>');
  // Links (standalone URLs)
  html = html.replace(/(https?:\/\/[^\s<]+)/g, '<a href="$1" target="_blank" rel="noopener">$1</a>');
  // Line breaks
  html = html.replace(/\n\n/g, '<br><br>');
  return html;
}

function escHtml(s) {
  const div = document.createElement('div');
  div.textContent = s;
  return div.innerHTML;
}

// ==================== DOM ====================
const $ = id => document.getElementById(id);
const sidebar = $('sidebar');
const sidebarBackdrop = $('sidebarBackdrop');
const threadList = $('threadList');
const messagesEl = $('messages');
const chatArea = $('chatArea');
const welcome = $('welcome');
const textInput = $('textInput');
const btnSend = $('btnSend');
const btnUpload = $('btnUpload');
const imgPreviewTag = $('imgPreviewTag');
const imgPreviewName = $('imgPreviewName');
const sendIcon = $('sendIcon');
const sendSpinner = $('sendSpinner');
const mainTitle = $('mainTitle');

// ==================== SMART SCROLL ====================
chatArea.addEventListener('scroll', () => {
  const atBottom = chatArea.scrollHeight - chatArea.scrollTop - chatArea.clientHeight < 60;
  userScrolledUp = !atBottom;
});

function scrollToBottom() {
  if (!userScrolledUp) {
    chatArea.scrollTop = chatArea.scrollHeight;
  }
}

// ==================== SIDEBAR ====================
function toggleSidebar() { sidebar.classList.toggle('open'); sidebarBackdrop.classList.toggle('show'); }
function closeSidebar() { sidebar.classList.remove('open'); sidebarBackdrop.classList.remove('show'); }

async function loadThreads() {
  try {
    const resp = await authFetch('/api/v1/chat/threads');
    if (!resp.ok) return;
    const data = await resp.json();
    threads = data.threads || [];
    renderThreads();
  } catch(e) {}
}

function renderThreads() {
  if (threads.length === 0) {
    threadList.innerHTML = '<div class="thread-empty">暂无历史会话<br><span style="font-size:12px;color:#9ca3af">开始一段新的对话吧 🐾</span></div>';
    return;
  }
  threadList.innerHTML = threads.map(t => {
    const isActive = t.thread_id === threadId;
    const msgCount = t.message_count ? `${t.message_count} 条消息` : '';
    return `
      <div class="thread-item${isActive ? ' active' : ''}" onclick="switchThread('${t.thread_id}')" title="${escHtml(t.title)}">
        <div class="thread-icon">${isActive ? '🐾' : '💬'}</div>
        <div class="thread-info">
          <div class="thread-title">${escHtml(t.title)}</div>
          ${msgCount ? `<div class="thread-meta">${msgCount}</div>` : ''}
        </div>
        <button class="thread-delete" onclick="event.stopPropagation();deleteThread('${t.thread_id}')" title="删除">×</button>
      </div>`;
  }).join('');
}

async function switchThread(tid) {
  if (tid === threadId || isStreaming) return;
  threadId = tid;
  sessionStorage.setItem(STORAGE_KEY, threadId);
  renderThreads();
  await loadMessages();
  closeSidebar();
}

async function createNewThread() {
  if (isStreaming) return;
  threadId = generateId();
  sessionStorage.setItem(STORAGE_KEY, threadId);
  renderThreads();
  clearChat();
  textInput.focus();
  closeSidebar();
}

async function deleteThread(tid) {
  if (isStreaming) return;
  toastConfirm('确定删除此会话？', async () => {
    try { await authFetch(`/api/v1/chat/messages?thread_id=${encodeURIComponent(tid)}`, { method: 'DELETE' }); } catch(e) {}
    if (tid === threadId) {
      threadId = generateId();
      sessionStorage.setItem(STORAGE_KEY, threadId);
      clearChat();
    }
    await loadThreads();
    toast('会话已删除');
  });
}

// ==================== MESSAGES ====================
async function loadMessages() {
  clearChat();
  showWelcome(false);
  try {
    const resp = await authFetch(`/api/v1/chat/messages?thread_id=${encodeURIComponent(threadId)}`);
    if (!resp.ok) { showWelcome(true); return; }
    const data = await resp.json();
    if (!data.messages || data.messages.length === 0) { showWelcome(true); return; }
    for (const msg of data.messages) {
      let content = msg.content;
      let imageUrl = msg.image_url || '';
      if (Array.isArray(content)) {
        const parts = [];
        for (const c of content) {
          if (typeof c === 'string') { parts.push(c); }
          else if (c.type === 'text') { parts.push(c.text || ''); }
          else if (c.type === 'image') { imageUrl = imageUrl || c.url || ''; }
        }
        content = parts.join(' ');
      }
      if (content || imageUrl) addMessageBubble(msg.role, String(content || ''), imageUrl, false);
    }
    scrollToBottom();
  } catch(e) { showWelcome(true); }
}

function clearChat() {
  messagesEl.innerHTML = '';
  const w = document.createElement('div');
  w.className = 'welcome';
  w.id = 'welcome';
  w.innerHTML = `<div class="welcome-icon"><div class="welcome-icon-inner"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg></div></div><h2>🐶 你好，我是你的 AI 宠物管家 🐱</h2><p>上传宠物照片或描述宠物情况，我会为你提供专业的养护建议</p><div class="welcome-tips">${getTipHtml()}</div>`;
  messagesEl.appendChild(w);
}

function getTipHtml() {
  const tips = [
    ['🔍 识别品类', '帮我识别这只宠物的品种'],
    ['💊 常见病科普', '宠物常见病有哪些？如何预防？'],
    ['🍖 喂食方案', '请给我一份科学的宠物喂养方案'],
    ['🛁 洗护建议', '宠物洗护的正确方法和频率'],
    ['🎾 训练技巧', '如何训练宠物养成良好的习惯？'],
    ['❤️ 健康评估', '请帮我评估这只宠物的健康状况'],
  ];
  return tips.map(([label, prompt]) =>
    `<span class="welcome-tip" onclick="fillPrompt('${escHtml(prompt)}')">${label}</span>`
  ).join('');
}

function fillPrompt(text) {
  textInput.value = text;
  textInput.style.height = 'auto';
  textInput.style.height = Math.min(textInput.scrollHeight, 120) + 'px';
  updateSendBtn();
  textInput.focus();
}

function showWelcome(show) {
  const w = document.getElementById('welcome');
  if (w) w.style.display = show ? '' : 'none';
}

function addMessageBubble(role, content, imageUrl, animate = true) {
  showWelcome(false);
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  if (!animate) div.style.animation = 'none';

  const avatar = document.createElement('div');
  avatar.className = 'msg-avatar';
  if (role === 'assistant') {
    avatar.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="4" r="2"/><circle cx="18" cy="8" r="2"/><circle cx="20" cy="16" r="2"/><circle cx="4" cy="16" r="2"/><path d="M12 12a4 4 0 1 0 0 8 4 4 0 1 0 0-8z"/></svg>`;
  } else {
    avatar.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>`;
  }

  const wrap = document.createElement('div');
  wrap.className = 'msg-content-wrap';

  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  if (imageUrl) {
    const img = document.createElement('img');
    img.src = imageUrl; img.className = 'msg-image';
    img.onclick = () => window.open(imageUrl, '_blank');
    bubble.appendChild(img);
  }
  if (content) {
    if (role === 'assistant') {
      bubble.innerHTML = renderMarkdown(content);
    } else {
      bubble.textContent = content;
      bubble.ondblclick = () => editUserMessage(bubble, content);
    }
  } else {
    const indicator = document.createElement('div');
    indicator.className = 'typing-indicator';
    indicator.innerHTML = '<div class="typing-dots"><span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span></div> AI 正在思考...';
    bubble.appendChild(indicator);
  }

  // Timestamp
  const time = document.createElement('div');
  time.className = 'msg-time';
  time.textContent = new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });

  // Action bar (only for assistant with content)
  if (role === 'assistant' && content) {
    const actions = document.createElement('div');
    actions.className = 'msg-actions';
    const copyBtn = document.createElement('button');
    copyBtn.textContent = '📋 复制';
    copyBtn.onclick = () => copyMessage(copyBtn, content);
    actions.appendChild(copyBtn);
    wrap.appendChild(bubble);
    wrap.appendChild(actions);
    wrap.appendChild(time);
  } else {
    wrap.appendChild(bubble);
    wrap.appendChild(time);
  }

  div.appendChild(avatar);
  div.appendChild(wrap);
  messagesEl.appendChild(div);
  scrollToBottom();
  return div;
}

function copyMessage(btn, text) {
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = '✅ 已复制';
    btn.classList.add('copied');
    toast('已复制到剪贴板');
    setTimeout(() => { btn.textContent = '📋 复制'; btn.classList.remove('copied'); }, 2000);
  }).catch(() => toast('复制失败', 'error'));
}

function editUserMessage(bubble, oldContent) {
  if (isStreaming) return;
  textInput.value = oldContent;
  textInput.style.height = 'auto';
  textInput.style.height = Math.min(textInput.scrollHeight, 120) + 'px';
  updateSendBtn();
  textInput.focus();
  toast('已填入输入框，修改后重新发送');
  // Remove the old message
  const msgEl = bubble.closest('.msg');
  if (msgEl) msgEl.remove();
}

// ==================== SEND ====================
async function uploadToOSS(file) {
  const resp = await authFetch(`/api/v1/oss/presign?filename=${encodeURIComponent(file.name)}`);
  if (!resp.ok) throw new Error('获取上传凭证失败');
  const { uploadUrl, accessUrl } = await resp.json();
  const upResp = await fetch(uploadUrl, {
    method: 'PUT', body: file,
    headers: { 'Content-Type': file.type || 'image/jpeg' }
  });
  if (!upResp.ok) throw new Error('上传图片失败');
  return accessUrl;
}

async function sendMessage() {
  const text = textInput.value.trim();
  if (isStreaming || (!text && !selectedImage)) return;

  isStreaming = true;
  setSending(true);
  showWelcome(false);
  userScrolledUp = false;

  let imageUrl = '';
  if (selectedImage) {
    try {
      const statusEl = addMessageBubble('assistant', '📤 正在上传图片...', '', false);
      imageUrl = await uploadToOSS(selectedImage.file);
      statusEl.remove();
    } catch(err) {
      addMessageBubble('assistant', '❌ 图片上传失败: ' + err.message, '', false);
      setSending(false); isStreaming = false; return;
    }
  }

  addMessageBubble('user', text || '（查看图片）', imageUrl);
  textInput.value = ''; textInput.style.height = 'auto'; removeImage();

  const aiEl = addMessageBubble('assistant', '', '');
  const bubble = aiEl.querySelector('.msg-bubble');

  try {
    const resp = await authFetch('/api/v1/chat/stream', {
      method: 'POST',
      body: JSON.stringify({ message: text, image_url: imageUrl, thread_id: threadId }),
    });
    if (!resp.ok) throw new Error(`请求失败 (${resp.status})`);
    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let full = '';
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      full += decoder.decode(value, { stream: true });
      bubble.innerHTML = renderMarkdown(full) || full;
      scrollToBottom();
    }
    if (!full) bubble.innerHTML = '暂无回复，请稍后重试。';
    // Post-process: add timestamp + action bar after streaming completes
    const wrap = aiEl.querySelector('.msg-content-wrap');
    const time = wrap.querySelector('.msg-time');
    if (time) time.textContent = new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
    // Add copy button
    if (full) {
      const actions = document.createElement('div');
      actions.className = 'msg-actions';
      const copyBtn = document.createElement('button');
      copyBtn.textContent = '📋 复制';
      copyBtn.onclick = () => copyMessage(copyBtn, full);
      actions.appendChild(copyBtn);
      wrap.insertBefore(actions, time);
    }
  } catch(err) {
    bubble.innerHTML = '❌ 请求失败: ' + err.message;
  }

  setSending(false);
  isStreaming = false;
  updateSendBtn();
  textInput.focus();
  loadThreads();
}

// ==================== IMAGE ====================
function handleImageSelect(e) {
  const file = e.target.files[0];
  if (!file) return;
  selectedImage = { file, previewUrl: URL.createObjectURL(file) };
  imgPreviewName.textContent = file.name;
  imgPreviewTag.style.display = 'flex';
  btnUpload.classList.add('has-image');
  updateSendBtn(); textInput.focus();
}
function removeImage() {
  if (selectedImage?.previewUrl) URL.revokeObjectURL(selectedImage.previewUrl);
  selectedImage = null;
  document.getElementById('imageInput').value = '';
  imgPreviewTag.style.display = 'none';
  btnUpload.classList.remove('has-image');
  updateSendBtn();
}

// ==================== HELPERS ====================
function setSending(on) {
  sendIcon.style.display = on ? 'none' : 'block';
  sendSpinner.style.display = on ? 'block' : 'none';
  btnSend.disabled = on;
}
function updateSendBtn() {
  btnSend.disabled = (!textInput.value.trim() && !selectedImage) || isStreaming;
}
function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  updateSendBtn();
}
function handleKeyDown(e) {
  if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) { e.preventDefault(); sendMessage(); }
  else if (e.key === 'Escape') { removeImage(); closeSidebar(); }
}
textInput.addEventListener('input', () => { autoResize(textInput); updateSendBtn(); });

// ==================== INIT ====================
async function init() {
  const headerUsername = document.getElementById('headerUsername');
  if (headerUsername && USERNAME) headerUsername.textContent = '👤 ' + USERNAME;
  await loadThreads();
  await loadMessages();
  textInput.focus();
}
init();

function logout() {
  sessionStorage.removeItem('token');
  sessionStorage.removeItem('username');
  window.location.replace('/login.html');
}
</script>
</body>
</html>
