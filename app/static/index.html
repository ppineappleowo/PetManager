<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 宠物管家</title>
<style>
:root {
  --primary: #059669; --primary-light: #34d399; --primary-dark: #047857;
  --secondary: #0d9488; --bg: #f0fdf4; --surface: #ffffff;
  --text: #1f2937; --text-secondary: #6b7280; --border: #d1fae5;
  --sidebar-width: 280px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: linear-gradient(135deg, #ecfdf5 0%, #d1fae5 40%, #ccfbf1 100%);
  height: 100vh; color: var(--text); overflow: hidden;
}

/* ====== SIDEBAR BACKDROP (mobile) ====== */
.sidebar-backdrop {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.3);
  z-index: 10;
}

/* ====== SIDEBAR ====== */
.sidebar {
  position: fixed; left: 0; top: 0; bottom: 0; width: var(--sidebar-width);
  background: rgba(255,255,255,0.92); backdrop-filter: blur(16px);
  border-right: 1px solid var(--border); z-index: 20;
  display: flex; flex-direction: column; transition: transform 0.25s ease;
}
.sidebar-header {
  padding: 16px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.sidebar-logo {
  display: flex; align-items: center; gap: 10px;
}
.sidebar-logo .icon {
  width: 34px; height: 34px;
  background: linear-gradient(135deg, var(--primary), var(--secondary));
  border-radius: 10px; display: flex; align-items: center; justify-content: center;
}
.sidebar-logo .icon svg { width: 20px; height: 20px; color: white; }
.sidebar-logo h1 { font-size: 16px; font-weight: 700;
  background: linear-gradient(135deg, var(--primary-dark), var(--secondary));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.btn-new-chat {
  width: calc(100% - 24px); margin: 12px auto; padding: 10px;
  border: 1px dashed var(--border); border-radius: 10px;
  background: rgba(5,150,105,0.05); color: var(--primary);
  font-size: 13px; font-weight: 600; cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 6px;
  transition: all 0.2s;
}
.btn-new-chat:hover { background: rgba(5,150,105,0.12); border-color: var(--primary-light); }
.thread-list { flex: 1; overflow-y: auto; padding: 4px 8px; }
.thread-list::-webkit-scrollbar { width: 3px; }
.thread-list::-webkit-scrollbar-thumb { background: #d1fae5; border-radius: 3px; }

.thread-item {
  display: flex; align-items: center; gap: 8px; padding: 10px 12px;
  border-radius: 10px; cursor: pointer; transition: all 0.15s;
  margin-bottom: 2px; position: relative;
}
.thread-item:hover { background: rgba(5,150,105,0.08); }
.thread-item.active { background: rgba(5,150,105,0.12); }
.thread-item.active .thread-title { color: var(--primary-dark); font-weight: 600; }
.thread-icon {
  width: 28px; height: 28px; border-radius: 8px; flex-shrink: 0;
  background: rgba(5,150,105,0.1); display: flex; align-items: center; justify-content: center;
  font-size: 13px;
}
.thread-item.active .thread-icon { background: linear-gradient(135deg, var(--primary), var(--secondary)); }
.thread-info { flex: 1; min-width: 0; }
.thread-title {
  font-size: 13px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.thread-meta {
  font-size: 11px; color: var(--text-secondary); margin-top: 2px;
}
.thread-delete {
  opacity: 0; width: 24px; height: 24px; border: none; background: none;
  color: #ef4444; cursor: pointer; border-radius: 6px; font-size: 14px;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  transition: all 0.15s;
}
.thread-item:hover .thread-delete { opacity: 1; }
.thread-delete:hover { background: rgba(239,68,68,0.1); }
.thread-empty {
  text-align: center; padding: 40px 16px; color: var(--text-secondary); font-size: 13px;
}

/* ====== MAIN AREA ====== */
.main {
  margin-left: var(--sidebar-width); height: 100vh;
  display: flex; flex-direction: column; transition: margin-left 0.25s ease;
}
.main-header {
  display: flex; align-items: center; gap: 12px; padding: 12px 16px;
  background: rgba(255,255,255,0.85); backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.btn-toggle-sidebar {
  display: none; width: 36px; height: 36px; border: none; background: none;
  border-radius: 8px; cursor: pointer; color: var(--text-secondary); font-size: 20px;
  align-items: center; justify-content: center;
}
.btn-toggle-sidebar:hover { background: rgba(0,0,0,0.05); }
.main-header-title { font-size: 15px; font-weight: 600; color: var(--text); }

/* Chat area */
.chat-area {
  flex: 1; overflow-y: auto; padding: 16px;
  display: flex; flex-direction: column;
}
.chat-area::-webkit-scrollbar { width: 4px; }
.chat-area::-webkit-scrollbar-thumb { background: #d1fae5; border-radius: 4px; }

/* Welcome */
.welcome {
  flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
  text-align: center; padding: 40px 20px;
}
.welcome-icon {
  width: 64px; height: 64px; background: rgba(5,150,105,0.1); border-radius: 50%;
  display: flex; align-items: center; justify-content: center; margin-bottom: 12px;
}
.welcome-icon svg { width: 36px; height: 36px; color: var(--primary); }
.welcome h2 { font-size: 17px; color: var(--text); margin-bottom: 4px; }
.welcome p { font-size: 13px; color: var(--text-secondary); }
.welcome-tips { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; margin-top: 14px; }
.welcome-tip {
  padding: 5px 12px; background: rgba(255,255,255,0.8); border-radius: 16px;
  font-size: 12px; border: 1px solid var(--border);
}

/* Messages */
.messages { display: flex; flex-direction: column; gap: 16px; flex: 1; }
.msg { display: flex; gap: 10px; max-width: 85%; animation: fadeIn 0.3s ease; }
.msg.user { align-self: flex-end; flex-direction: row-reverse; }
.msg.assistant { align-self: flex-start; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
.msg-avatar {
  width: 32px; height: 32px; border-radius: 10px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center; font-size: 15px;
}
.msg.user .msg-avatar { background: #e5e7eb; }
.msg.assistant .msg-avatar { background: linear-gradient(135deg, var(--primary), var(--secondary)); }
.msg-avatar svg { width: 18px; height: 18px; }
.msg.user .msg-avatar svg { color: #6b7280; }
.msg.assistant .msg-avatar svg { color: white; }
.msg-bubble {
  padding: 10px 14px; border-radius: 14px; font-size: 14px; line-height: 1.65;
  word-break: break-word; white-space: pre-wrap;
  box-shadow: 0 1px 2px rgba(0,0,0,0.04);
}
.msg.user .msg-bubble {
  background: var(--primary); color: white; border-bottom-right-radius: 4px;
}
.msg.assistant .msg-bubble {
  background: var(--surface); color: var(--text); border: 1px solid #f0fdf4;
  border-bottom-left-radius: 4px;
}
.msg-image { max-width: 200px; max-height: 200px; border-radius: 10px; margin-bottom: 6px; cursor: pointer; }
.typing-dot {
  display: inline-block; width: 5px; height: 5px; border-radius: 50%;
  background: var(--primary); margin: 0 1px; animation: bounce 1.2s infinite;
}
.typing-dot:nth-child(2) { animation-delay: 0.2s; }
.typing-dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce {
  0%, 60%, 100% { transform: translateY(0); }
  30% { transform: translateY(-4px); }
}

/* Input */
.input-area {
  padding: 12px 16px 16px; flex-shrink: 0;
}
.input-row { display: flex; gap: 8px; align-items: flex-end;
  background: rgba(255,255,255,0.85); backdrop-filter: blur(12px);
  border-radius: 16px; padding: 8px 10px; border: 1px solid var(--border);
}
.btn-upload {
  width: 38px; height: 38px; border: none; border-radius: 10px;
  background: #f0fdf4; color: var(--primary); cursor: pointer;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  transition: all 0.2s;
}
.btn-upload:hover { background: #d1fae5; }
.btn-upload.has-image { background: var(--primary); color: white; }
#imageInput { display: none; }
.textarea-wrap { flex: 1; position: relative; }
.textarea-wrap textarea {
  width: 100%; border: none; border-radius: 10px; padding: 8px 10px;
  font-size: 14px; resize: none; outline: none; background: transparent;
  font-family: inherit; line-height: 1.5;
}
.img-preview-tag {
  position: absolute; top: -26px; left: 4px; display: none; align-items: center; gap: 4px;
  background: var(--primary); color: white; padding: 2px 10px; border-radius: 10px; font-size: 11px;
}
.img-preview-tag button { background: none; border: none; color: white; cursor: pointer; font-size: 14px; padding: 0 2px; }
.btn-send {
  width: 40px; height: 40px; border: none; border-radius: 10px;
  background: linear-gradient(135deg, var(--primary), var(--secondary));
  color: white; cursor: pointer; display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: all 0.2s; box-shadow: 0 2px 8px rgba(5,150,105,0.3);
}
.btn-send:hover:not(:disabled) { transform: scale(1.05); }
.btn-send:disabled { background: #d1d5db; box-shadow: none; cursor: not-allowed; }
.btn-send svg { width: 20px; height: 20px; }
.spinner { width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.6s linear infinite; display: none; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ====== RESPONSIVE ====== */
@media (max-width: 768px) {
  .sidebar { transform: translateX(-100%); }
  .sidebar.open { transform: translateX(0); }
  .sidebar-backdrop.show { display: block; }
  .btn-toggle-sidebar { display: flex; }
  .main { margin-left: 0 !important; }
  .msg { max-width: 92%; }
}
</style>
</head>
<body>

<!-- Sidebar backdrop -->
<div class="sidebar-backdrop" id="sidebarBackdrop" onclick="closeSidebar()"></div>

<!-- ====== SIDEBAR ====== -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <div class="sidebar-logo">
      <div class="icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="4" r="2"/><circle cx="18" cy="8" r="2"/><circle cx="20" cy="16" r="2"/><circle cx="4" cy="16" r="2"/><path d="M12 12a4 4 0 1 0 0 8 4 4 0 1 0 0-8z"/></svg>
      </div>
      <h1>AI 宠物管家</h1>
    </div>
  </div>
  <button class="btn-new-chat" onclick="createNewThread()">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5v14"/></svg>
    新建会话
  </button>
  <div class="thread-list" id="threadList">
    <div class="thread-empty">暂无历史会话</div>
  </div>
</aside>

<!-- ====== MAIN ====== -->
<div class="main" id="main">
  <div class="main-header">
    <button class="btn-toggle-sidebar" onclick="toggleSidebar()" title="会话列表">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
    </button>
    <span class="main-header-title" id="mainTitle">宠物养护咨询</span>
  </div>

  <div class="chat-area" id="chatArea">
    <div class="messages" id="messages">
      <div class="welcome" id="welcome">
        <div class="welcome-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>
        </div>
        <h2>🐶 你好，我是你的 AI 宠物管家 🐱</h2>
        <p>上传宠物照片或描述宠物情况，我会为你提供专业的养护建议</p>
        <div class="welcome-tips">
          <span class="welcome-tip">🔍 识别品类</span>
          <span class="welcome-tip">💊 常见病科普</span>
          <span class="welcome-tip">🍖 喂食方案</span>
          <span class="welcome-tip">🛁 洗护建议</span>
          <span class="welcome-tip">🎾 训练技巧</span>
          <span class="welcome-tip">❤️ 健康评估</span>
        </div>
      </div>
    </div>
  </div>

  <div class="input-area">
    <div class="input-row">
      <button class="btn-upload" id="btnUpload" onclick="document.getElementById('imageInput').click()" title="上传图片">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect width="18" height="18" x="3" y="3" rx="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></svg>
      </button>
      <input type="file" id="imageInput" accept="image/*" onchange="handleImageSelect(event)">
      <div class="textarea-wrap">
        <div class="img-preview-tag" id="imgPreviewTag">📷 <span id="imgPreviewName"></span><button onclick="removeImage()">×</button></div>
        <textarea id="textInput" rows="1" placeholder="描述你的宠物情况..."
          onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage()}"
          oninput="autoResize(this)"></textarea>
      </div>
      <button class="btn-send" id="btnSend" disabled onclick="sendMessage()">
        <svg id="sendIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14.536 21.686a.5.5 0 0 0 .937-.024l6.5-19a.496.496 0 0 0-.635-.635l-19 6.5a.5.5 0 0 0-.024.937l7.93 3.18a2 2 0 0 1 1.112 1.11z"/><path d="m21.854 2.147-10.94 10.939"/></svg>
        <div class="spinner" id="sendSpinner"></div>
      </button>
    </div>
  </div>
</div>

<script>
// ==================== STATE ====================
const STORAGE_KEY = 'pet_manager_thread_id';
let threadId = sessionStorage.getItem(STORAGE_KEY) || generateId();
let selectedImage = null;
let isStreaming = false;
let threads = [];

sessionStorage.setItem(STORAGE_KEY, threadId);

function generateId() { return 'thread_' + Date.now() + '_' + Math.random().toString(36).slice(2,9); }

// ==================== DOM ====================
const $ = id => document.getElementById(id);
const sidebar = $('sidebar');
const sidebarBackdrop = $('sidebarBackdrop');
const threadList = $('threadList');
const messagesEl = $('messages');
const chatArea = $('chatArea');
const welcome = $('welcome');
const textInput = $('textInput');
const btnSend = $('btnSend');
const btnUpload = $('btnUpload');
const imgPreviewTag = $('imgPreviewTag');
const imgPreviewName = $('imgPreviewName');
const sendIcon = $('sendIcon');
const sendSpinner = $('sendSpinner');
const mainTitle = $('mainTitle');

// ==================== SIDEBAR ====================
function toggleSidebar() {
  sidebar.classList.toggle('open');
  sidebarBackdrop.classList.toggle('show');
}
function closeSidebar() {
  sidebar.classList.remove('open');
  sidebarBackdrop.classList.remove('show');
}

async function loadThreads() {
  try {
    const resp = await fetch('/api/v1/chat/threads');
    if (!resp.ok) return;
    const data = await resp.json();
    threads = data.threads || [];
    renderThreads();
  } catch(e) { console.log('加载会话列表失败:', e); }
}

function renderThreads() {
  if (threads.length === 0) {
    threadList.innerHTML = '<div class="thread-empty">暂无历史会话<br><span style="font-size:12px">开始一段新的对话吧 🐾</span></div>';
    return;
  }
  threadList.innerHTML = threads.map(t => {
    const isActive = t.thread_id === threadId;
    const msgCount = t.message_count ? `${t.message_count} 条消息` : '';
    return `
      <div class="thread-item${isActive ? ' active' : ''}" onclick="switchThread('${t.thread_id}')" title="${escHtml(t.title)}">
        <div class="thread-icon">${isActive ? '🐾' : '💬'}</div>
        <div class="thread-info">
          <div class="thread-title">${escHtml(t.title)}</div>
          ${msgCount ? `<div class="thread-meta">${msgCount}</div>` : ''}
        </div>
        <button class="thread-delete" onclick="event.stopPropagation();deleteThread('${t.thread_id}')" title="删除">×</button>
      </div>`;
  }).join('');
}

function escHtml(s) {
  const div = document.createElement('div');
  div.textContent = s;
  return div.innerHTML;
}

async function switchThread(tid) {
  if (tid === threadId || isStreaming) return;
  threadId = tid;
  sessionStorage.setItem(STORAGE_KEY, threadId);
  renderThreads();
  await loadMessages();
  closeSidebar();
}

async function createNewThread() {
  if (isStreaming) return;
  threadId = generateId();
  sessionStorage.setItem(STORAGE_KEY, threadId);
  renderThreads();
  clearChat();
  textInput.focus();
  closeSidebar();
}

async function deleteThread(tid) {
  if (isStreaming) return;
  if (!confirm('确定删除此会话？')) return;
  try {
    await fetch(`/api/v1/chat/messages?thread_id=${encodeURIComponent(tid)}`, { method: 'DELETE' });
  } catch(e) {}
  if (tid === threadId) {
    threadId = generateId();
    sessionStorage.setItem(STORAGE_KEY, threadId);
    clearChat();
  }
  await loadThreads();
}

// ==================== MESSAGES ====================
async function loadMessages() {
  clearChat();
  showWelcome(false);
  try {
    const resp = await fetch(`/api/v1/chat/messages?thread_id=${encodeURIComponent(threadId)}`);
    if (!resp.ok) { showWelcome(true); return; }
    const data = await resp.json();
    if (!data.messages || data.messages.length === 0) { showWelcome(true); return; }
    for (const msg of data.messages) {
      let content = msg.content;
      let imageUrl = msg.image_url || '';
      if (Array.isArray(content)) {
        const parts = [];
        for (const c of content) {
          if (typeof c === 'string') { parts.push(c); }
          else if (c.type === 'text') { parts.push(c.text || ''); }
          else if (c.type === 'image') { imageUrl = imageUrl || c.url || ''; }
        }
        content = parts.join(' ');
      }
      if (content || imageUrl) addMessageBubble(msg.role, String(content || ''), imageUrl);
    }
    scrollToBottom();
  } catch(e) {
    showWelcome(true);
  }
}

function clearChat() {
  messagesEl.innerHTML = '';
  const w = document.createElement('div');
  w.className = 'welcome';
  w.id = 'welcome';
  w.innerHTML = `<div class="welcome-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg></div><h2>🐶 你好，我是你的 AI 宠物管家 🐱</h2><p>上传宠物照片或描述宠物情况，我会为你提供专业的养护建议</p><div class="welcome-tips"><span class="welcome-tip">🔍 识别品类</span><span class="welcome-tip">💊 常见病科普</span><span class="welcome-tip">🍖 喂食方案</span><span class="welcome-tip">🛁 洗护建议</span><span class="welcome-tip">🎾 训练技巧</span><span class="welcome-tip">❤️ 健康评估</span></div>`;
  messagesEl.appendChild(w);
}

function showWelcome(show) {
  const w = document.getElementById('welcome');
  if (w) w.style.display = show ? '' : 'none';
}

function addMessageBubble(role, content, imageUrl) {
  showWelcome(false);
  const div = document.createElement('div');
  div.className = `msg ${role}`;

  const avatar = document.createElement('div');
  avatar.className = 'msg-avatar';
  if (role === 'assistant') {
    avatar.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="4" r="2"/><circle cx="18" cy="8" r="2"/><circle cx="20" cy="16" r="2"/><circle cx="4" cy="16" r="2"/><path d="M12 12a4 4 0 1 0 0 8 4 4 0 1 0 0-8z"/></svg>`;
  } else {
    avatar.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>`;
  }

  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  if (imageUrl) {
    const img = document.createElement('img');
    img.src = imageUrl; img.className = 'msg-image';
    img.onclick = () => window.open(imageUrl, '_blank');
    bubble.appendChild(img);
  }
  if (content) {
    const span = document.createElement('span');
    span.textContent = content;
    bubble.appendChild(span);
  } else {
    for (let i = 0; i < 3; i++) { const d = document.createElement('span'); d.className = 'typing-dot'; bubble.appendChild(d); }
  }

  div.appendChild(avatar); div.appendChild(bubble);
  messagesEl.appendChild(div);
  scrollToBottom();
  return div;
}

// ==================== SEND ====================
async function uploadToOSS(file) {
  const resp = await fetch(`/api/v1/oss/presign?filename=${encodeURIComponent(file.name)}`);
  if (!resp.ok) throw new Error('获取上传凭证失败');
  const { uploadUrl, accessUrl } = await resp.json();
  const upResp = await fetch(uploadUrl, { method: 'PUT', body: file, headers: { 'Content-Type': file.type || 'image/jpeg' } });
  if (!upResp.ok) throw new Error('上传图片失败');
  return accessUrl;
}

async function sendMessage() {
  const text = textInput.value.trim();
  if (isStreaming || (!text && !selectedImage)) return;

  isStreaming = true;
  setSending(true);
  showWelcome(false);

  let imageUrl = '';
  if (selectedImage) {
    try {
      const statusEl = addMessageBubble('assistant', '📤 正在上传图片...');
      imageUrl = await uploadToOSS(selectedImage.file);
      statusEl.remove();
    } catch(err) {
      addMessageBubble('assistant', '❌ 图片上传失败: ' + err.message);
      setSending(false); isStreaming = false; return;
    }
  }

  addMessageBubble('user', text || '（查看图片）', imageUrl);
  textInput.value = ''; textInput.style.height = 'auto'; removeImage();

  const aiEl = addMessageBubble('assistant', '');
  const aiBubble = aiEl.querySelector('.msg-bubble');

  try {
    const resp = await fetch('/api/v1/chat/stream', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text, image_url: imageUrl, thread_id: threadId }),
    });
    if (!resp.ok) throw new Error(`请求失败 (${resp.status})`);
    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let full = '';
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      full += decoder.decode(value, { stream: true });
      aiBubble.textContent = full;
      scrollToBottom();
    }
    if (!full) aiBubble.textContent = '暂无回复，请稍后重试。';
  } catch(err) {
    aiBubble.textContent = '❌ 请求失败: ' + err.message;
  }

  setSending(false);
  isStreaming = false;
  updateSendBtn();
  textInput.focus();
  // Refresh thread list to update title
  loadThreads();
}

// ==================== IMAGE ====================
function handleImageSelect(e) {
  const file = e.target.files[0];
  if (!file) return;
  selectedImage = { file, previewUrl: URL.createObjectURL(file) };
  imgPreviewName.textContent = file.name;
  imgPreviewTag.style.display = 'flex';
  btnUpload.classList.add('has-image');
  updateSendBtn(); textInput.focus();
}
function removeImage() {
  if (selectedImage?.previewUrl) URL.revokeObjectURL(selectedImage.previewUrl);
  selectedImage = null;
  document.getElementById('imageInput').value = '';
  imgPreviewTag.style.display = 'none';
  btnUpload.classList.remove('has-image');
  updateSendBtn();
}

// ==================== HELPERS ====================
function setSending(on) {
  sendIcon.style.display = on ? 'none' : 'block';
  sendSpinner.style.display = on ? 'block' : 'none';
  btnSend.disabled = on;
}
function updateSendBtn() {
  btnSend.disabled = (!textInput.value.trim() && !selectedImage) || isStreaming;
}
function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  updateSendBtn();
}
function scrollToBottom() { chatArea.scrollTop = chatArea.scrollHeight; }
textInput.addEventListener('input', () => { autoResize(textInput); updateSendBtn(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') { removeImage(); closeSidebar(); } });

// ==================== INIT ====================
async function init() {
  await loadThreads();
  await loadMessages();
  textInput.focus();
}
init();
</script>
</body>
</html>
